<header
  class="sticky top-0 z-40 border-b border-slate-200/70 bg-slate-50/90 text-slate-900 shadow-sm shadow-slate-200/60 backdrop-blur dark:border-slate-800 dark:bg-slate-950/90 dark:text-slate-100 dark:shadow-slate-950/40"
>
  <div
    class="mx-auto flex max-w-7xl items-center justify-between px-4 py-2 sm:px-6 lg:px-8"
  >
    <!-- Logo -->
    <a
      href="#"
      data-page="home"
      class="flex items-center text-lg font-semibold tracking-tight text-slate-900 transition-colors hover:text-brand-600 dark:text-slate-100 dark:hover:text-brand-400"
    >
      <span class="flex h-14 w-14 items-center justify-center">
        <img src="images/screen.png" alt="Statistics Calculator Logo" />
      </span>

      <span>Statistics Calculator</span>
    </a>

    <!-- Desktop Navigation -->
    <nav
      id="desktop-menu"
      class="hidden items-center gap-6 text-sm font-medium md:flex"
    >
      <!-- Generated by JavaScript -->
    </nav>

    <!-- Right Buttons -->
    <div class="flex items-center gap-3">
      <button
        id="theme-toggle"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-300 bg-white text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-brand-500 hover:text-brand-600 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:border-brand-400 dark:hover:text-brand-400"
        aria-label="Switch to dark mode"
        type="button"
      >
        <span class="text-base leading-none">☀︎</span>
      </button>

      <button
        id="mobile-menu-toggle"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-300 bg-white text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-brand-500 hover:text-brand-600 md:hidden dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:border-brand-400 dark:hover:text-brand-400"
        aria-label="Open menu"
        type="button"
      >
        <span class="text-base leading-none">☰</span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    id="mobile-menu"
    class="hidden border-t border-slate-200 bg-slate-50 px-4 py-4 text-slate-800 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-200 md:hidden"
  >
    <div id="mobile-menu-links" class="flex flex-col gap-3 text-sm font-medium">
      <!-- Generated by JavaScript -->
    </div>
  </div>
</header>
