<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
  <div
    class="mb-8 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900"
  >
    <p class="text-sm font-semibold uppercase tracking-[0.25em] text-brand-600">
      Formula library
    </p>
    <h1 class="mt-3 text-3xl font-semibold sm:text-4xl">
      A categorized reference for key statistics formulas.
    </h1>
    <input
      id="formula-search"
      type="search"
      placeholder="Search formulas or topics"
      class="mt-5 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 outline-none focus:border-brand-500 dark:border-slate-700 dark:bg-slate-950 md:max-w-md"
      aria-label="Search formulas"
    />
  </div>
  <div id="formula-library" class="grid gap-6"></div>
</main>
